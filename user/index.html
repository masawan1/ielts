<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Official Simulator - Live Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-[#2b303a] text-white border-b border-slate-700 shadow-md flex-shrink-0 z-10 py-3 px-6">
        <div class="max-w-7xl mx-auto w-full flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-4">
                <span class="bg-blue-600 px-2.5 py-1 rounded font-black text-xs tracking-wider">CBT</span>
                <h1 class="text-md font-bold" id="pilar-badge">IELTS SIMULATOR</h1>
            </div>
            
            <div class="flex items-center gap-1 bg-[#1a1d24] p-1 rounded-xl text-xs font-bold text-slate-400">
                <button onclick="pindahModul('Listening', 2400)" class="px-4 py-2 rounded-lg transition" id="nav-Listening">Listening</button>
                <button onclick="pindahModul('Reading', 3600)" class="px-4 py-2 rounded-lg transition" id="nav-Reading">Reading</button>
                <button onclick="pindahModul('Writing', 3600)" class="px-4 py-2 rounded-lg transition" id="nav-Writing">Writing</button>
                <button onclick="pindahModul('Speaking', 840)" class="px-4 py-2 rounded-lg transition" id="nav-Speaking">Speaking</button>
            </div>

            <div id="timer" class="text-sm font-extrabold px-4 py-2 bg-rose-600 text-white rounded-lg shadow animate-pulse">
                Time Left: 60:00
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4 overflow-hidden h-[calc(100vh-65px)]">
        
        <section class="bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col h-full overflow-hidden">
            <div class="bg-slate-100/80 px-4 py-2.5 border-b border-slate-200 flex justify-between items-center flex-shrink-0">
                <span id="panel-tag" class="text-[10px] font-extrabold text-blue-600 uppercase tracking-widest">Passage Panel</span>
                <div id="left-sub-nav" class="flex gap-1"></div> </div>
            <div class="p-6 overflow-y-auto flex-1 text-sm text-slate-700 leading-relaxed space-y-4" id="passage-content">
                <p class="text-slate-400 italic text-center py-20">Menghubungkan ke server CBT IELTS...</p>
            </div>
        </section>

        <section class="bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col h-full overflow-hidden">
            <div class="bg-slate-100/80 px-4 py-2.5 border-b border-slate-200 flex justify-between items-center flex-shrink-0">
                <span class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest" id="total-questions-badge">Answer Sheet</span>
                <div id="right-sub-nav" class="flex gap-1"></div>
            </div>
            <div class="p-6 overflow-y-auto flex-1 space-y-5" id="quiz-container">
                </div>
            <div class="p-4 border-t border-slate-100 flex-shrink-0 bg-white">
                <button onclick="submitUserAnswers()" class="w-full bg-[#2b303a] hover:bg-black text-white font-bold py-3.5 rounded-xl text-xs transition tracking-wide shadow-md">
                    Submit Answers
                </button>
            </div>
        </section>
    </main>

    <div id="result-modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl max-w-sm w-full mx-4 p-8 text-center shadow-2xl transform scale-95 transition-transform duration-300" id="result-box">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-black">CBT</div>
            <h3 class="text-xl font-extrabold text-slate-900" id="modal-heading">Test Completed</h3>
            <p class="text-[11px] text-slate-400 mt-1">Hasil evaluasi lembar jawaban simulator</p>
            <div class="my-5 py-5 bg-slate-50 rounded-2xl border border-slate-200">
                <div class="text-6xl font-black text-blue-600" id="band-score">0.0</div>
                <div class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-2" id="correct-fraction">Band Score</div>
            </div>
            <button onclick="location.reload()" class="w-full py-3.5 bg-slate-900 hover:bg-black text-white text-xs font-bold rounded-xl transition shadow">Selesai & Keluar</button>
        </div>
    </div>

    <script src="script.js?v=2.0"></script>
</body>
</html>
