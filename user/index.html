<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IELTS Simulator - CBT Student Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=6.0">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col select-none antialiased">

    <header class="bg-[#2b303a] text-white border-b border-slate-700 shadow-md flex-shrink-0 z-40 py-3 px-4 lg:px-6 w-full">
        <div class="max-w-7xl mx-auto w-full flex flex-col md:flex-row justify-between items-center gap-3">
            <div class="flex items-center justify-between w-full md:w-auto gap-3">
                <div class="flex items-center gap-2">
                    <span class="bg-blue-600 px-2 py-0.5 rounded font-black text-[9px] tracking-wider">CBT ENGINE</span>
                    <h1 class="text-xs font-bold truncate max-w-[180px] sm:max-w-none" id="pilar-badge">IELTS SIMULATION</h1>
                </div>
                <div id="timer" class="text-[11px] font-extrabold px-2.5 py-1 bg-rose-600 text-white rounded-lg shadow-md animate-pulse">
                    60:00
                </div>
            </div>
            
            <div class="w-full md:w-auto overflow-x-auto no-scrollbar pb-1 md:pb-0">
                <div class="flex items-center bg-[#1a1d24] p-1 rounded-xl text-[11px] font-bold text-slate-400 border border-slate-700/60 shadow-inner min-w-[340px] md:min-w-0">
                    <button onclick="pindahModul('Listening', 2400)" class="px-3 py-1.5 rounded-lg transition-all text-center flex-1 md:flex-none" id="nav-Listening">Listening</button>
                    <button onclick="pindahModul('Reading', 3600)" class="px-3 py-1.5 rounded-lg transition-all text-center flex-1 md:flex-none" id="nav-Reading">Reading</button>
                    <button onclick="pindahModul('Writing', 3600)" class="px-3 py-1.5 rounded-lg transition-all text-center flex-1 md:flex-none" id="nav-Writing">Writing</button>
                    <button onclick="pindahModul('Speaking', 840)" class="px-3 py-1.5 rounded-lg transition-all text-center flex-1 md:flex-none" id="nav-Speaking">Speaking</button>
                </div>
            </div>
        </div>
    </header>

    <div id="workspace-container" class="workspace-layout w-full max-w-7xl mx-auto p-2 md:p-4 flex-1">
        
        <section id="panel-kiri" class="panel-box bg-white border border-slate-200 rounded-2xl shadow-sm flex flex-col overflow-hidden">
            <div class="bg-slate-50/80 px-4 py-3 border-b border-slate-200/60 flex justify-between items-center flex-shrink-0">
                <span class="text-[9px] font-extrabold text-blue-600 uppercase tracking-widest">Passage Content</span>
                <div id="left-sub-nav" class="flex gap-1 overflow-x-auto no-scrollbar max-w-[65%]"></div> 
            </div>
            <div class="panel-scroll-area p-4 sm:p-6 md:p-8 text-xs sm:text-sm text-slate-700 leading-relaxed space-y-4" id="passage-content">
                <p class="text-slate-400 italic text-center py-12">Connecting to secure simulator server...</p>
            </div>
        </section>

        <section id="panel-kanan" class="panel-box bg-white border border-slate-200 rounded-2xl shadow-sm flex flex-col overflow-hidden">
            <div class="bg-slate-50/80 px-4 py-3 border-b border-slate-200/60 flex justify-between items-center flex-shrink-0">
                <span class="text-[9px] font-extrabold text-slate-500 uppercase tracking-widest">Answer Sheet</span>
                <div id="right-sub-nav" class="flex gap-1 overflow-x-auto no-scrollbar max-w-[65%]"></div>
            </div>
            <div class="panel-scroll-area p-4 sm:p-6 space-y-4 bg-slate-50/40" id="quiz-container"></div>
            
            <div class="p-4 border-t border-slate-100 bg-white flex-shrink-0 w-full mt-auto">
                <button onclick="submitUserAnswers()" class="w-full bg-[#2b303a] hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl text-xs shadow-md tracking-wider transition-colors">
                    Submit Test Answers
                </button>
            </div>
        </section>
    </div>

    <div class="md:hidden bg-white border-t border-slate-200 h-14 w-full flex items-center justify-around px-2 flex-shrink-0 fixed bottom-0 left-0 right-0 z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button id="mobile-btn-materi" onclick="gantiTabMobile('materi')" class="flex flex-col items-center justify-center text-blue-600 font-extrabold text-[11px] w-1/3 py-1 transition-all">
            <span class="text-lg mb-0.5">📖</span> Passage
        </button>
        <button id="mobile-btn-jawaban" onclick="gantiTabMobile('jawaban')" class="flex flex-col items-center justify-center text-slate-400 font-bold text-[11px] w-1/3 py-1 transition-all">
            <span class="text-lg mb-0.5">📋</span> Answers
        </button>
        <div class="w-1/3 px-1">
            <button onclick="submitUserAnswers()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-2 rounded-lg text-[11px] text-center shadow-sm">
                Submit
            </button>
        </div>
    </div>

    <div id="result-modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl max-w-sm w-full mx-4 p-6 sm:p-8 text-center shadow-2xl transform scale-95 transition-transform duration-300" id="result-box">
            <h3 class="text-lg font-extrabold text-slate-900 tracking-tight">Assessment Finished</h3>
            <div class="my-5 py-5 bg-slate-50 rounded-2xl border border-slate-200">
                <div class="text-5xl font-black text-blue-600" id="band-score">0.0</div>
                <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-2" id="correct-fraction">Detail</div>
            </div>
            <button onclick="location.reload()" class="w-full py-3 bg-slate-900 text-white text-xs font-bold rounded-xl shadow-md">Dashboard</button>
        </div>
    </div>

    <script src="script.js?v=6.0"></script>
</body>
</html>
