<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Workspace - Live AI Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 py-4 px-6 shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-extrabold tracking-tight">IELTS<span class="text-blue-600">AI-Prep</span></h1>
            <div class="flex items-center gap-4">
                <span id="pilar-badge" class="text-[10px] font-bold px-3 py-1 bg-blue-50 text-blue-600 rounded-full uppercase tracking-widest">Loading...</span>
                <span id="timer" class="text-xs font-bold px-3 py-1 bg-rose-50 text-rose-600 rounded-lg shadow-sm animate-pulse">20:00</span>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <section class="md:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Academic Reading Passage</span>
            <h2 id="passage-title" class="text-xl font-bold text-slate-900 mt-1 mb-4">Memuat materi ujian...</h2>
            <div id="passage-content" class="text-slate-600 leading-relaxed text-sm space-y-4">
                <p>Sedang mengambil materi otentik dari database...</p>
            </div>
        </section>

        <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
            <h3 class="text-xs font-bold text-slate-900 uppercase mb-4">Interactive Quiz</h3>
            <div id="quiz-container" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
            <button onclick="submitUserAnswers()" class="w-full mt-6 bg-slate-900 hover:bg-black text-white font-bold py-3 rounded-xl text-xs transition shadow-md">
                Submit Jawaban
            </button>
        </section>
    </main>

    <script>
        // GANTI DENGAN URL DEPLOYMENT APPS SCRIPT ANDA
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqP3_9F7mRWh99t36b9EwI_ZisH1uGgBCHd8eL_Sg-3uD8tCjX8wH67y7X_N4K10U/exec";
        
        let kunciJawaban = [];
        let sisaWaktu = 1200; // 20 Menit
        let intervalTimer = null;

        window.addEventListener('load', () => {
            fetchData();
            startTimer();
        });

        function startTimer() {
            const display = document.getElementById('timer');
            if (intervalTimer) clearInterval(intervalTimer);

            intervalTimer = setInterval(() => {
                let m = Math.floor(sisaWaktu / 60);
                let s = sisaWaktu % 60;
                display.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                
                if (sisaWaktu <= 0) {
                    clearInterval(intervalTimer);
                    display.innerText = "0:00";
                    submitUserAnswers();
                } else {
                    sisaWaktu--;
                }
            }, 1000);
        }

        function fetchData() {
            const cb = 'cb_' + Math.floor(Math.random()*100000);
            window[cb] = (data) => {
                const item = data[data.length - 1];
                document.getElementById('pilar-badge').innerText = item.pilar || "Reading";
                document.getElementById('passage-title').innerText = item.judul;
                document.getElementById('passage-content').innerHTML = item.konten.split('\n\n').map(p => `<p>${p}</p>`).join('');
                renderQuiz(item.pertanyaan, item.kunci_jawaban);
                delete window[cb];
            };
            const s = document.createElement('script');
            s.src = `${SCRIPT_URL}?action=getQuestions&callback=${cb}`;
            document.body.appendChild(s);
        }

        function renderQuiz(soal, kunci) {
            const container = document.getElementById('quiz-container');
            kunciJawaban = kunci.split(',');
            soal.split('\n').forEach((s, i) => {
                if(s.trim()) {
                    container.innerHTML += `
                    <div class="p-3 border border-slate-100 rounded-lg text-xs" data-index="${i}">
                        <p class="font-semibold mb-2">${s}</p>
                        <div class="grid grid-cols-3 gap-1">
                            <button onclick="pilih(this, 'TRUE')" class="p-1.5 border rounded hover:bg-blue-50 transition">TRUE</button>
                            <button onclick="pilih(this, 'FALSE')" class="p-1.5 border rounded hover:bg-blue-50 transition">FALSE</button>
                            <button onclick="pilih(this, 'NOT GIVEN')" class="p-1.5 border rounded hover:bg-blue-50 transition">N.G</button>
                        </div>
                    </div>`;
                }
            });
        }

        function pilih(el, val) {
            el.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            el.classList.add('bg-blue-600', 'text-white');
            el.parentElement.parentElement.dataset.answer = val;
        }

        function submitUserAnswers() {
            if (intervalTimer) clearInterval(intervalTimer);
            let skor = 0;
            document.querySelectorAll('#quiz-container > div').forEach(div => {
                const jawabanUser = div.dataset.answer;
                const index = div.dataset.index;
                if(jawabanUser === kunciJawaban[index].trim()) skor++;
            });
            alert("Ujian Selesai! Skor Anda: " + skor + " dari " + kunciJawaban.length);
            location.reload();
        }
    </script>
</body>
</html>
