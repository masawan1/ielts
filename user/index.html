<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Platform - Live AI Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-slate-200 shadow-sm flex-shrink-0 z-10">
        <div class="max-w-7xl mx-auto w-full px-4 md:px-6 py-3 flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-bold tracking-tight text-slate-900">
                    IELTS<span class="text-blue-600">AI-Prep</span>
                </h1>
                <div class="h-5 w-[1px] bg-slate-200 hidden sm:block"></div>
                <span id="pilar-badge" class="text-xs font-bold px-3 py-1 bg-blue-50 text-blue-600 rounded-lg uppercase tracking-wide">
                    IELTS Reading
                </span>
            </div>
            
            <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl text-xs font-bold text-slate-500">
                <button onclick="pindahModul('Listening', 2400)" class="px-3 py-1.5 rounded-lg hover:text-slate-800 transition" id="nav-Listening">Listening</button>
                <button onclick="pindahModul('Reading', 3600)" class="px-3 py-1.5 rounded-lg bg-white text-blue-600 shadow-sm transition" id="nav-Reading">Reading</button>
                <button onclick="pindahModul('Writing', 3600)" class="px-3 py-1.5 rounded-lg hover:text-slate-800 transition" id="nav-Writing">Writing</button>
                <button onclick="pindahModul('Speaking', 840)" class="px-3 py-1.5 rounded-lg hover:text-slate-800 transition" id="nav-Speaking">Speaking</button>
            </div>

            <div class="flex items-center gap-2">
                <span id="timer" class="text-xs font-bold px-3 py-1.5 bg-rose-50 text-rose-600 rounded-lg shadow-sm">Time Limit: 60:00</span>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-3 gap-6 overflow-hidden h-[calc(100vh-73px)]">
        
        <section class="md:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-full overflow-hidden">
            <div class="border-b border-slate-100 pb-3 mb-4 flex-shrink-0 flex justify-between items-center">
                <div>
                    <span id="panel-tag" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Academic Reading Passage</span>
                    <h2 id="passage-title" class="text-xl font-bold text-slate-900 mt-0.5">Memuat materi...</h2>
                </div>
                <span id="format-info-badge" class="text-[10px] bg-slate-100 text-slate-600 font-medium px-2 py-1 rounded">3 Teks / 40 Soal</span>
            </div>
            
            <div id="passage-content" class="text-slate-600 leading-relaxed text-sm space-y-4 overflow-y-auto flex-1 pr-2">
                <p class="text-slate-400 italic text-center py-12">Menghubungkan ke database Google Sheets Anda...</p>
            </div>
        </section>

        <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-full overflow-hidden">
            <div class="flex justify-between items-center mb-4 flex-shrink-0 border-b border-slate-100 pb-3">
                <h3 class="text-sm font-bold text-slate-900">Interactive Quiz</h3>
                <span id="total-questions-badge" class="text-[10px] text-slate-500 bg-slate-100 px-2 py-0.5 rounded font-medium">True/False/NG</span>
            </div>
            
            <div id="quiz-container" class="flex-1 overflow-y-auto space-y-5 pr-2">
                </div>
            
            <div class="pt-4 border-t border-slate-100 flex-shrink-0 bg-white">
                <button id="btn-submit" onclick="submitUserAnswers()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl text-xs transition shadow-md">
                    Submit Answers
                </button>
            </div>
        </section>
    </main>

    <div id="result-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl max-w-sm w-full mx-4 p-8 text-center shadow-2xl transform scale-95 transition-transform duration-300" id="result-box">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-black">AI</div>
            <h3 class="text-xl font-extrabold text-slate-900" id="modal-heading">Ujian Selesai!</h3>
            <p class="text-[11px] text-slate-500 mt-1" id="modal-subheading">Hasil evaluasi lembar jawaban Anda</p>
            
            <div class="my-5 py-5 bg-slate-50 rounded-2xl border border-slate-100">
                <div class="text-5xl font-black text-blue-600" id="band-score">0.0</div>
                <div class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-2" id="correct-fraction">Benar 0 dari 2</div>
            </div>
            <button onclick="reloadPage()" class="w-full py-3.5 bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold rounded-xl transition shadow">
                Selesai & Ulangi Latihan
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
