<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English & IELTS Simulator Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3.1">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-[#2b303a] text-white border-b border-slate-700 shadow-md flex-shrink-0 z-10 py-3 px-4">
        <div class="max-w-7xl mx-auto w-full flex flex-col lg:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <span id="mode-status-badge" class="bg-blue-600 px-2 py-0.5 rounded font-black text-[10px]">SIMULATION MODE</span>
                <h1 class="text-xs font-bold" id="pilar-badge">IELTS SIMULATOR</h1>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-2">
                <div class="flex items-center bg-[#1a1d24] p-1 rounded-lg text-[11px] font-bold text-slate-400 border border-slate-700">
                    <button onclick="pindahModul('Listening', 2400)" class="px-2.5 py-1 rounded transition" id="nav-Listening">IELTS Listening</button>
                    <button onclick="pindahModul('Reading', 3600)" class="px-2.5 py-1 rounded transition" id="nav-Reading">IELTS Reading</button>
                    <button onclick="pindahModul('Writing', 3600)" class="px-2.5 py-1 rounded transition" id="nav-Writing">IELTS Writing</button>
                    <button onclick="pindahModul('Speaking', 840)" class="px-2.5 py-1 rounded transition" id="nav-Speaking">IELTS Speaking</button>
                </div>
                <div class="flex items-center bg-emerald-950/80 p-1 rounded-lg text-[11px] font-bold text-emerald-400 border border-emerald-800">
                    <button onclick="pindahModul('Grammar & Vocab', 0)" class="px-2.5 py-1 rounded transition" id="nav-GrammarVocab">Grammar/Vocab</button>
                    <button onclick="pindahModul('Daily Conversation', 0)" class="px-2.5 py-1 rounded transition" id="nav-DailyConversation">Daily Listening</button>
                    <button onclick="pindahModul('Short Expression', 0)" class="px-2.5 py-1 rounded transition" id="nav-ShortExpression">Short Writing</button>
                    <button onclick="pindahModul('Pronunciation', 0)" class="px-2.5 py-1 rounded transition" id="nav-Pronunciation">Pronunciation</button>
                </div>
            </div>

            <div id="timer" class="text-xs font-extrabold px-3 py-1 bg-rose-600 text-white rounded shadow transition duration-200">
                Time Left: 60:00
            </div>
        </div>
    </header>

    <div id="workspace-container" class="flex-1 w-full flex overflow-hidden h-[calc(100vh-65px)] p-4 gap-0">
        
        <section id="panel-kiri" class="bg-white border border-slate-200 rounded-l-xl shadow-sm flex flex-col h-full overflow-hidden" style="width: 50%; min-width: 25%; max-width: 75%;">
            <div class="bg-slate-100/80 px-4 py-2.5 border-b border-slate-200 flex justify-between items-center flex-shrink-0">
                <span id="panel-tag" class="text-[10px] font-extrabold text-blue-600 uppercase tracking-widest">Study Canvas</span>
                <div id="left-sub-nav" class="flex gap-1"></div> 
            </div>
            <div class="p-6 overflow-y-auto flex-1 text-sm text-slate-700 leading-relaxed space-y-4" id="passage-content">
                <p class="text-slate-400 italic text-center py-20">Menghubungkan ke server CBT...</p>
            </div>
        </section>

        <div id="panel-resizer" class="w-2 hover:w-3 bg-slate-200 hover:bg-blue-500 cursor-col-resize transition-all flex items-center justify-center z-20">
            <div class="w-[2px] h-8 bg-slate-400 rounded"></div>
        </div>

        <section id="panel-kanan" class="bg-white border border-slate-200 rounded-r-xl shadow-sm flex flex-col h-full overflow-hidden flex-1">
            <div class="bg-slate-100/80 px-4 py-2.5 border-b border-slate-200 flex justify-between items-center flex-shrink-0">
                <span class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest" id="total-questions-badge">Practice Sheet</span>
                <div id="right-sub-nav" class="flex gap-1"></div>
            </div>
            <div class="p-6 overflow-y-auto flex-1 space-y-5 bg-slate-50/50" id="quiz-container"></div>
            <div class="p-4 border-t border-slate-100 flex-shrink-0 bg-white">
                <button onclick="submitUserAnswers()" class="w-full bg-[#2b303a] hover:bg-black text-white font-bold py-3.5 rounded-xl text-xs shadow-md tracking-wide">
                    Submit Answers
                </button>
            </div>
        </section>
    </div>

    <div id="result-modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl max-w-sm w-full mx-4 p-8 text-center shadow-2xl transform scale-95 transition-transform duration-300" id="result-box">
            <h3 class="text-xl font-extrabold text-slate-900" id="modal-heading">Practice Completed</h3>
            <div class="my-5 py-5 bg-slate-50 rounded-2xl border border-slate-200">
                <div class="text-5xl font-black text-blue-600" id="band-score">Score</div>
                <div class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-2" id="correct-fraction">Detail</div>
            </div>
            <button onclick="location.reload()" class="w-full py-3.5 bg-slate-900 text-white text-xs font-bold rounded-xl shadow">Selesai</button>
        </div>
    </div>

    <script src="script.js?v=3.1"></script>
</body>
</html>
