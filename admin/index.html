<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS AI Generator - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-md font-bold tracking-tight">IELTS Admin Panel</h1>
            <span class="text-[10px] font-semibold text-emerald-400 bg-emerald-500/10 px-2.5 py-1 rounded-full">Sistem Aktif</span>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <section class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-md font-bold text-slate-900 mb-4">Generate Soal Otomatis</h2>
                
                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Pilih Pilar IELTS yang Ingin Dibuat</label>
                    <select id="select-pilar" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold focus:outline-none focus:border-blue-500">
                        <option value="Listening">Listening (Mendengarkan)</option>
                        <option value="Reading" selected>Reading (Membaca)</option>
                        <option value="Writing">Writing (Menulis)</option>
                        <option value="Speaking">Speaking (Berbicara)</option>
                    </select>
                </div>

                <button id="btn-generate-ai" onclick="generateMateriOtomatis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 text-xs">
                    ✨ Generate Soal Lewat AI
                </button>
            </div>
        </section>

        <section class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h2 class="text-md font-bold text-slate-900">Log Produksi Soal Real-time</h2>
                    <button onclick="ambilLogDariSpreadsheet()" class="text-xs text-blue-600 font-bold hover:underline">Refresh Data</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead>
                            <tr class="border-b bg-slate-50/30 text-slate-500">
                                <th class="px-6 py-3">Pilar</th>
                                <th class="px-6 py-3">Judul Materi</th>
                                <th class="px-6 py-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="log-output" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="message-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl max-w-sm w-full mx-4 p-6 shadow-xl text-center">
            <h3 class="text-lg font-bold text-slate-900" id="msg-title">Info</h3>
            <p class="text-xs text-slate-600 mt-2 mb-4" id="msg-body">Pesan</p>
            <button onclick="document.getElementById('message-modal').classList.add('hidden')" class="w-full bg-slate-900 text-white text-xs font-bold py-2.5 rounded-lg">Tutup</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
