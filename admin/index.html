<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS & English Platform - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col antialiased">

    <header class="bg-slate-950/80 backdrop-blur-md border-b border-slate-800/80 py-4 px-6 shadow-xl flex-shrink-0">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center font-black text-white shadow-lg">A</div>
                <h1 class="text-md font-bold tracking-tight">English & IELTS Panel <span class="text-xs font-medium text-slate-500 ml-1">AI Control Engine</span></h1>
            </div>
            <span class="text-[10px] font-extrabold text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-full uppercase tracking-wider border border-emerald-500/20">Active</span>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 overflow-hidden">
        
        <section class="lg:col-span-1 space-y-4 flex flex-col justify-start">
            <div class="bg-slate-950 border border-slate-800 p-6 rounded-2xl shadow-2xl relative">
                <h2 class="text-sm font-extrabold text-white tracking-tight flex items-center gap-2 mb-1">🤖 AI Content Generator</h2>
                <p class="text-[11px] text-slate-400 leading-relaxed mb-6">Pilih pilar ujian IELTS atau modul belajar Bahasa Inggris umum untuk di-generate AI ke database.</p>
                
                <div class="mb-5">
                    <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2">Pilih Komponen Materi</label>
                    <select id="select-pilar" class="w-full p-3.5 bg-slate-900 border border-slate-800 rounded-xl text-xs font-bold text-slate-200 focus:outline-none focus:border-blue-500 cursor-pointer">
                        <optgroup label="🏆 IELTS OFFICIAL SIMULATION">
                            <option value="Listening">IELTS Listening</option>
                            <option value="Reading" selected>IELTS Reading</option>
                            <option value="Writing">IELTS Writing</option>
                            <option value="Speaking">IELTS Speaking</option>
                        </optgroup>
                        <optgroup label="📚 GENERAL ENGLISH LEARNING">
                            <option value="Grammar & Vocab">📝 Grammar & Vocabulary Practice</option>
                            <option value="Daily Conversation">💬 Daily Conversation Listening</option>
                            <option value="Short Expression">✍️ Short Expression Writing</option>
                            <option value="Pronunciation">🗣️ Pronunciation & Aloud Speaking</option>
                        </optgroup>
                    </select>
                </div>

                <button id="btn-generate-ai" onclick="generateMateriOtomatis()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-extrabold py-3.5 px-4 rounded-xl transition duration-200 text-xs shadow-lg">
                    ✨ Generate Soal Baru Lewat AI
                </button>
            </div>
            
            <div class="bg-slate-950 border border-slate-800 p-5 rounded-2xl space-y-2">
                <h3 class="text-xs font-extrabold text-red-400 uppercase">⚠️ Dangerous Zone</h3>
                <button onclick="hapusSemuaDatabaseSoal()" class="w-full bg-red-950/40 hover:bg-red-900/60 border border-red-500/30 text-red-400 transition font-bold py-2.5 rounded-xl text-[11px]">
                    🗑️ Wipe/Hapus Semua Database Soal
                </button>
            </div>
        </section>

        <section class="lg:col-span-2 flex flex-col h-full overflow-hidden">
            <div class="bg-slate-950 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col h-full">
                <div class="p-5 border-b border-slate-800/80 flex justify-between items-center bg-slate-950/40">
                    <h2 class="text-sm font-extrabold text-white">Log Database Active Material</h2>
                    <button onclick="ambilLogDariSpreadsheet()" class="text-xs bg-slate-900 border border-slate-800 text-blue-400 font-bold px-3 py-1.5 rounded-lg">🔄 Refresh Log</button>
                </div>
                
                <div class="overflow-y-auto flex-1 max-h-[calc(100vh-230px)]">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-800 bg-slate-900/30 text-slate-400 text-[10px] font-extrabold uppercase tracking-widest">
                                <th class="px-6 py-3.5 w-36">Kategori</th>
                                <th class="px-6 py-3.5">Judul Materi Buatan AI</th>
                                <th class="px-6 py-3.5 text-center w-24">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="log-output" class="divide-y divide-slate-800/60 text-xs text-slate-300"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="message-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-sm w-full mx-4 p-6 text-center transform scale-95 transition-transform duration-300" id="message-box">
            <h3 class="text-sm font-bold text-white" id="msg-title">Notification</h3>
            <p class="text-xs text-slate-400 mt-2 mb-5 leading-relaxed" id="msg-body">Pesan</p>
            <button onclick="closeModal()" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-3 rounded-xl">Tutup Jendela</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
