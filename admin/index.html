<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Simulator - CBT Student Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-[#2b303a] text-white border-b border-slate-700 shadow-md flex-shrink-0 z-10 py-3 px-6">
        <div class="max-w-7xl mx-auto w-full flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="bg-blue-600 px-2.5 py-0.5 rounded font-black text-[10px] tracking-wider">CBT ENGINE</span>
                <h1 class="text-xs font-bold" id="pilar-badge">OFFICIAL SIMULATION - IELTS</h1>
            </div>
            
            <div class="flex items-center bg-[#1a1d24] p-1 rounded-xl text-[11px] font-bold text-slate-400 border border-slate-700/60 shadow-inner">
                <button onclick="pindahModul('Listening', 2400)" class="px-4 py-1.5 rounded-lg transition-all" id="nav-Listening">Listening</button>
                <button onclick="pindahModul('Reading', 3600)" class="px-4 py-1.5 rounded-lg transition-all" id="nav-Reading">Reading</button>
                <button onclick="pindahModul('Writing', 3600)" class="px-4 py-1.5 rounded-lg transition-all" id="nav-Writing">Writing</button>
                <button onclick="pindahModul('Speaking', 840)" class="px-4 py-1.5 rounded-lg transition-all" id="nav-Speaking">Speaking</button>
            </div>

            <div id="timer" class="text-xs font-extrabold px-4 py-1.5 bg-rose-600 text-white rounded-lg shadow-md animate-pulse tracking-wide">
                Time Left: --:--
            </div>
        </div>
    </header>

    <div id="workspace-container" class="flex-1 w-full flex overflow-hidden h-[calc(100vh-68px)] p-4 gap-0">
        
        <section id="panel-kiri" class="bg-white border border-slate-200 rounded-l-2xl shadow-sm flex flex-col h-full overflow-hidden" style="width: 50%; min-width: 25%; max-width: 75%;">
            <div class="bg-slate-50/80 px-4 py-3 border-b border-slate-200/60 flex justify-between items-center flex-shrink-0">
                <span class="text-[10px] font-extrabold text-blue-600 uppercase tracking-widest">Passage Panel</span>
                <div id="left-sub-nav" class="flex flex-wrap gap-1.5"></div> 
            </div>
            <div class="p-6 md:p-8 overflow-y-auto flex-1 text-sm text-slate-700 leading-relaxed space-y-4" id="passage-content">
                <p class="text-slate-400 italic text-center py-24">Connecting to secure spreadsheet server...</p>
            </div>
        </section>

        <div id="panel-resizer" class="w-2 hover:w-3 bg-slate-200 hover:bg-blue-500 cursor-col-resize transition-all flex items-center justify-center z-20 shadow-inner">
            <div class="w-[2px] h-10 bg-slate-400 rounded-full"></div>
        </div>

        <section id="panel-kanan" class="bg-white border border-slate-200 rounded-r-2xl shadow-sm flex flex-col h-full overflow-hidden flex-1">
            <div class="bg-slate-50/80 px-4 py-3 border-b border-slate-200/60 flex justify-between items-center flex-shrink-0">
                <span class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Answer Sheet</span>
                <div id="right-sub-nav" class="flex flex-wrap gap-1.5"></div>
            </div>
            <div class="p-6 overflow-y-auto flex-1 space-y-4 bg-slate-50/40" id="quiz-container"></div>
            
            <div class="p-4 border-t border-slate-200/60 flex-shrink-0 bg-white">
                <button onclick="submitUserAnswers()" class="w-full bg-[#2b303a] hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl text-xs shadow-md tracking-wider transition-colors">
                    End Pillar & Submit Answers
                </button>
            </div>
        </section>
    </div>

    <div id="result-modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl max-w-sm w-full mx-4 p-8 text-center shadow-2xl transform scale-95 transition-transform duration-300" id="result-box">
            <h3 class="text-xl font-extrabold text-slate-900 tracking-tight">Pillar Assessment Finished</h3>
            <div class="my-6 py-6 bg-slate-50 border border-slate-200/60 rounded-2xl">
                <div class="text-6xl font-black text-blue-600" id="band-score">0.0</div>
                <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-2" id="correct-fraction">Evaluating results...</div>
            </div>
            <button onclick="location.reload()" class="w-full py-3.5 bg-slate-900 hover:bg-black text-white text-xs font-bold rounded-xl shadow-md transition-colors">
                Return Dashboard
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
